<div id="datasheet">
<div id="content" class="mt-2">
<form class="mt-2" method="POST" name="New Job" hx-post="{% url 'editprice' form.instance.id %}" hx-trigger='submit' hx-swap="outerHTML" hx-target="#content">
    {% csrf_token %}
    <div class="form-floating mb-3">
        {{ form.BuyingPrice }}
        <label for="BuyingPrice">ဝယ်ဈေး</label>
    </div>
    <div class="form-floating mb-3">
        {{ form.Cost }}
        <label for="Cost">ကုန်ကျစရိတ်</label>
    </div>
    <div class="form-floating mb-3">
        {{ form.Expected_Profit}}
        <label for="Expected_Profit">အမြတ်</label>
    </div>
    <!-- <div class="form-floating mb-3">
        {{ form.MemberPrice }}
        <label for="MemberPrice">လက်ကားဈေး</label>
    </div>
    <ul>
        {% for h in form.instance.history.all|slice:":3" %}
        <li>{{ h.MemberPrice }}@{{ h.history_date }}</li>
        {% endfor %}
    </ul> -->
    <div class="form-floating mb-3">
        {{ form.RetailPrice }}
        <label for="RetailPrice">လက်လီဈေး</label>
    </div>

    <ul>
        {% for h in form.instance.history.all|slice:":3" %}
        <li>{{ h.RetailPrice }}@{{ h.history_date }}</li>
        {% endfor %}
    </ul>
    
    <button class="w-100 btn btn-lg btn-primary md-4" type="submit">Submit</button>
</form>
</div>
</div>
