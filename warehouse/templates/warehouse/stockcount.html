
<div id="content" class='container'>
    <div class="card">
        <div class="card-header text-center mb-3">Stock Count Form</div>
        <div class='card-body'>
            <form method="POST" name="invoice">
                {% csrf_token %}
                <label for="Inventory">Inventory</label>
                {{ form.Inventory }}
                <label for="CountQty">CountQty</label>
                {{ form.CountQty }}
                <label for="Note">Note</label>
                {{ form.Note }}

                {% if form.errors %}
                {{ form.errors }}
                {% endif %}
                <br>
                <button class="btn btn-primary" type="submit">Submit</button>
            </form>
        </div>
    </div>
</div>
